<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#F5EFE6;
    color:#5C4033;
}

/* Header */
header{
    background:#A67C52;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:36px;
    margin-bottom:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

nav a:hover{
    color:#FFF4E6;
}

/* Container */
.container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#8B5E3C;
    margin-bottom:30px;
}

/* Contact */
.contact-box{
    display:flex;
    justify-content:space-between;
    gap:40px;
    flex-wrap:wrap;
}

.info{
    flex:1;
    min-width:280px;
}

.info p{
    margin:15px 0;
    font-size:18px;
}

/* Form */
form{
    flex:1;
    min-width:280px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #C8B6A6;
    border-radius:10px;
    font-size:16px;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:#A67C52;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#8B5E3C;
}

/* Footer */
footer{
    margin-top:40px;
    background:#A67C52;
    color:white;
    text-align:center;
    padding:15px;
}

/* Responsive */
@media(max-width:768px){

.contact-box{
    flex-direction:column;
}

nav a{
    display:block;
    margin:10px 0;
}

}
</style>

</head>
<body>

<header>

<h1>My Portfolio</h1>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="education.html">Education</a>
<a href="portfolio.html">Portfolio</a>
<a href="skills.html">Skills</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<div class="container">

<h2>Contact Me</h2>

<div class="contact-box">

<div class="info">

<h3>ข้อมูลการติดต่อ</h3>

<p>👤 <strong>ชื่อ :</strong> นางสาว ไปรยา รื่นรมย์  </p>

<p>📞 <strong>โทร :</strong> 091-765-6280</p>

<p>📧 <strong>Email :</strong> @gmail.com</p>

<p>📍 <strong>ที่อยู่ :</strong> จังหวัด ชลบุรี</p>

<p>🌐 <strong>Facebook :</strong> facebook.com/yourname</p>

<p>📷 <strong>Instagram :</strong> @yourname</p>

</div>

<form>

<input type="text" placeholder="ชื่อของคุณ" required>

<input type="email" placeholder="อีเมล" required>

<textarea rows="6" placeholder="ข้อความ"></textarea>

<button type="submit">ส่งข้อความ</button>

</form>

</div>

</div>

<footer>

<p>© 2026 My Portfolio | Your Name</p>

</footer>

</body>
</html>
