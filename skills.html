<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills | My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#F5EFE6;
    color:#5C4033;
}

/* Header */
header{
    background:#A67C52;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:36px;
    margin-bottom:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

nav a:hover{
    color:#FFF4E6;
}

/* กล่องเนื้อหา */
.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#8B5E3C;
    margin-bottom:30px;
}

/* Skill Box */
.skill{
    margin-bottom:25px;
}

.skill-name{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-weight:bold;
}

.bar{
    width:100%;
    height:20px;
    background:#E8DDD0;
    border-radius:20px;
    overflow:hidden;
}

.progress{
    height:100%;
    background:#A67C52;
    border-radius:20px;
}

/* Soft Skills */
.soft-skill{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-top:40px;
}

.box{
    background:#FFF8F2;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-weight:bold;
    color:#6D4C41;
    border:2px solid #D7CCC8;
    transition:.3s;
}

.box:hover{
    background:#A67C52;
    color:white;
}

footer{
    background:#A67C52;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

@media(max-width:768px){

nav a{
    display:block;
    margin:10px 0;
}

}
</style>

</head>
<body>

<header>

<h1>My Portfolio</h1>

<nav>

<a href="contact.html">Contact</a>
</nav>

</header>

</div>

</div>
</div>

<span>85%</span>
</div>
<div class="bar">

</div>
</div>

<div class="skill">

<span>Microsoft Word</span>
<span>95%</span>
</div>
<div class="bar">

</div>

</div>

</div>
</div>

<div class="skill">

<span>Canva</span>
<span>95%</span>
</div>
<div class="bar">
<div class="progress" style="width:95%;"></div>
</div>
</div>

<h2>Soft Skills</h2>

<div class="soft-skill">

<div class="box">🤝 Teamwork</div>

<div class="box">💬 Communication</div>

</div>

</div>

<footer>
<p>© 2026 My Portfolio | Your Name</p>
</footer>

</body>
</html>
