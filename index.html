<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            background:#F5EFE6;
            color:#5C4033;
        }

        /* Header */
        header{
            background:#A67C52;
            color:white;
            text-align:center;
            padding:20px;
        }

        header h1{
            font-size:40px;
            margin-bottom:10px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
            font-weight:bold;
        }

        nav a:hover{
            color:#FFF4E6;
        }

        /* กล่องเนื้อหา */
        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#8B5E3C;
            margin-bottom:25px;
        }

        /* รูปภาพ */
        .image-box{
            text-align:center;
            margin-bottom:30px;
        }

        .image-box img{
            width:250px;
            height:250px;
            object-fit:cover;
            border-radius:15px;
            border:5px solid #A67C52;
        }

        p{
            font-size:18px;
            line-height:1.8;
            text-align:center;
        }

        /* ปุ่ม */
        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 30px;
            background:#A67C52;
            color:white;
            text-decoration:none;
            border-radius:30px;
        }

        .btn:hover{
            background:#8B5E3C;
        }

        footer{
            background:#A67C52;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:40px;
        }
    </style>

</head>
<body>

<header>

    <h1>My Portfolio</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="education.html">Education</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<div class="container">

    <h2>Potfolio</h2>

    <!-- ใส่รูปภาพ -->
    <div class="image-box">
        <img src="images/profile.jpg" alt="รูปภาพ">
    </div>

    <p>
        นางสาว ไปรยา รื่นรมย์ 
        ศึกษาที่โรงเรียนพานทอง 
        แผนการเรียน วิทยาศาสตร์-คณิตศาสตร์ <br>
        
    </p>

    <center>
        <a href="#" class="btn">อ่านเพิ่มเติม</a>
    </center>

</div>

<footer>
    <p>© 2026 My Portfolio | Your Name</p>
</footer>

</body>
</html>

</html>
